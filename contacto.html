<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Contacto - Ailén Echaguibel</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100&family=Poppins:wght@600&display=swap" rel="stylesheet">
    
</head>
<body>
     <header>
      <div class="container-navbar">
        <div class="logo-header">
          <h3>Ailén Echaguibel</h3>
        </div>

        <div class="navbar">
            <div class="links">
                <a href="sobre-mi.html">Sobre mi</a>
                <a href="portafolio.html">Portafolio</a>
                <a href="contacto.html">Contacto</a>
            </div> 
        </div>
      </div>
    </header>

    <div class="container-contact">
        <div class="contact">
            <h2>Contacto</h2>
            <p class="contact-email">También podés escribirme directamente a <a href="ailenechaguibel@gmail.com">ailenechaguibel@gmail.com</a></p>
        </div>

        <form action="#" method="post" class="form-contact">
                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Mensaje</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit" class="btn">Enviar</button>
            </form>
    </div>

    <div class="footer">
        <div class="container-footer">
            <p>© 2026 Ailén Echaguibel</p>
            <a href="ailenechaguibel@gmail.com">ailenechaguibel@gmail.com</a>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
